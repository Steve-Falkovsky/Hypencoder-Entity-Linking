model_config:
  tokenizer_pretrained_model_name_or_path: cambridgeltl/SapBERT-from-PubMedBERT-fulltext
  query_encoder_kwargs:
    model_name_or_path: cambridgeltl/SapBERT-from-PubMedBERT-fulltext
    freeze_transformer: false
    embedding_representation: null
    base_encoder_output_dim: 768
    converter_kwargs:
      vector_dimensions: [768, 768, 768, 1]
      activation_type: relu
      do_residual_on_last: false
  passage_encoder_kwargs:
    model_name_or_path: cambridgeltl/SapBERT-from-PubMedBERT-fulltext
    freeze_transformer: false
    pooling_type: cls
  shared_encoder: true
  loss_type:
    - cross_entropy
  loss_kwargs:
    - { "use_in_batch_negatives": true, "only_use_first_item": false }
data_config:
  training_huggingface_dataset: Stevenf232/hypencoder_contrastiveLoss_context_tokenised_score
  training_data_split: train
  validation_huggingface_dataset: Stevenf232/hypencoder_contrastiveLoss_context_tokenised_score
  validation_data_split: validation
  positive_filter_type: first # first means that the first item will be treated as a positive
  label_key: score
  num_positives_to_sample: 1
  # num_negatives_to_sample: 7
  num_negatives_to_sample: 0
trainer_config:
  hf_trainer_config:
    output_dir: model/hypencoder.2_layer_SapBERT
    overwrite_output_dir: false
    remove_unused_columns: false
    eval_strategy: steps
    eval_steps: 10
    per_device_train_batch_size: 64
    per_device_eval_batch_size: 64
    gradient_accumulation_steps: 1
    dataloader_prefetch_factor: 5
    dataloader_num_workers: 2
    dataloader_persistent_workers: false
    learning_rate: 2.0e-05
    weight_decay: 0.0
    # num_train_epochs: 5
    lr_scheduler_type: linear
    warmup_ratio: 0.1
    warmup_steps: 0
    logging_strategy: steps
    logging_steps: 10
    logging_dir: logs # This enables TensorBoard logging
    max_steps: 200 # overrides num_train_epochs
    save_strategy: steps
    save_steps: 2500
    save_total_limit: null
    save_only_model: false
    bf16: false
    tf32: false
    fp16: true
    run_name: "hypencoder.2_layer_SapBERT"
    disable_tqdm: true
    ddp_find_unused_parameters: true
    #fsdp: false
    #fsdp: "no_shard"
    #fsdp_config: null
    report_to: tensorboard
    push_to_hub: false
    hub_model_id: null
    hub_strategy: every_save
    hub_private_repo: true
    gradient_checkpointing: false
    save_safetensors: false
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-08
    torch_compile: false
  resume_from_checkpoint: false
